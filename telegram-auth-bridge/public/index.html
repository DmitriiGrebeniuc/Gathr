<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telegram Auth Bridge</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f0f10;
        color: #f2f2f2;
        font-family: Arial, sans-serif;
      }

      .card {
        padding: 24px 28px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.24);
        max-width: 520px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      p {
        margin: 0;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.8);
      }

      code {
        color: #d4af37;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Telegram Auth Bridge</h1>
      <p>
        Service scaffold is deployed. Health check should be available at
        <code>/api/health</code>.
      </p>
    </div>
  </body>
</html>
